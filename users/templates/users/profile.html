<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            width: 420px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        form p {
            margin: 10px 0;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 5px rgba(108,99,255,0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #574fd6;
        }

        .message {
            text-align: center;
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="profile-container">

    <h2>My Profile</h2>

    <!-- Error / Message Section -->
    {% if error %}
        <div class="message">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div style="text-align:center; color:green; margin-bottom:10px;">
            {{ success }}
        </div>
    {% endif %}

    <!-- Profile Form -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- User Form -->
        {{ u_form.as_p }}

        <!-- Profile Form -->
        {{ p_form.as_p }}

        <button type="submit">Update Profile</button>
    </form>

</div>

</body>
</html>
